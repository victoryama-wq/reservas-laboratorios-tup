<app-availability-calendar
  title="Disponibilidad"
  [subtitle]="lab().name"
  [scheduleSummary]="scheduleSummary()"
  [viewMode]="selectedView()"
  [currentRangeLabel]="currentRangeLabel()"
  [days]="calendarDays()"
  [hours]="calendarHours()"
  [slots]="calendarSlots()"
  [selectedSlot]="selectedSlot()"
  [loading]="loading()"
  [errorMessage]="errorMessage()"
  [emptyMessage]="emptyMessage()"
  [readLimitMessage]="readLimitMessage()"
  [showLegend]="true"
  (previousRange)="goToPreviousRange()"
  (nextRange)="goToNextRange()"
  (today)="goToToday()"
  (viewModeChange)="setView($event)"
  (slotSelected)="selectCalendarSlot($event)"
/>
